<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Options Club - Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.90)), url('https://images.unsplash.com/photo-1642790106117-e829e14a795f?q=80&w=1974&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .main-card {
      width: 100%;
      max-width: 1050px;
      background: rgba(12,18,35,0.95);
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,140,255,0.35);
      border: 1px solid rgba(0,153,255,0.25);
    }

    .left-panel {
      background: linear-gradient(135deg,#00112b,#021f4d,#00112b);
      padding: 60px 40px;
      color: white;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .company-logo {
      width: 260px;
      max-width: 100%;
      height: auto;
      object-fit: contain;
      margin-bottom: 25px;
      padding: 10px;
      display: block;
      filter: drop-shadow(0 0 20px rgba(0,132,255,0.6));
    }

    .brand-title {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .brand-subtitle {
      font-size: 18px;
      opacity: 0.85;
      line-height: 1.8;
    }

    .right-panel {
      padding: 50px;
      background: #0b1220;
    }

    .nav-pills .nav-link {
      border-radius: 12px;
      color: #d1d5db;
      font-weight: 600;
      padding: 12px 18px;
    }

      .nav-pills .nav-link.active {
        background: linear-gradient(90deg,#0066ff,#00c6ff);
        color: white;
      }

    .form-title {
      color: white;
      font-weight: 700;
      margin-bottom: 25px;
    }

    label {
      color: #cbd5e1;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .form-control {
      height: 52px;
      border-radius: 14px;
      background: #111827;
      border: 1px solid #1e293b;
      color: white;
    }

      .form-control:focus {
        background: #111827;
        color: white;
        border-color: #00bfff;
        box-shadow: 0 0 10px rgba(0,191,255,0.5);
      }

    .btn-main {
      height: 52px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(90deg,#0066ff,#00c6ff);
      color: white;
      font-weight: 700;
      transition: 0.3s;
    }

      .btn-main:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 20px rgba(0,162,255,0.45);
      }

    .forgot-link {
      color: #38bdf8;
      text-decoration: none;
      font-size: 14px;
    }

      .forgot-link:hover {
        color: white;
      }

    .small-text {
      color: #94a3b8;
      font-size: 14px;
    }

    @media(max-width:768px) {

      .left-panel {
        display: none;
      }

      .right-panel {
        padding: 30px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="main-card row g-0">

      <!-- LEFT SIDE -->
      <div class="col-md-5 left-panel">

        <!-- YOUR COMPANY LOGO -->
        <img src="OptionsClub.png"
             class="company-logo"
             alt="Options Club Logo">

        <h1 class="brand-title">OPTIONS CLUB</h1>

        <p class="brand-subtitle">
          Professional Trading Community<br>
          Learn • Trade • Grow
        </p>

      </div>

      <!-- RIGHT SIDE -->
      <div class="col-md-7 right-panel">

        <!-- NAVIGATION -->
        <ul class="nav nav-pills mb-4 justify-content-center">

          <li class="nav-item">
            <button class="nav-link active"
                    data-bs-toggle="pill"
                    data-bs-target="#login">
              Login
            </button>
          </li>

          <li class="nav-item">
            <button class="nav-link"
                    data-bs-toggle="pill"
                    data-bs-target="#register">
              Register
            </button>
          </li>

          <li class="nav-item">
            <button class="nav-link"
                    data-bs-toggle="pill"
                    data-bs-target="#forgot">
              Forgot Password
            </button>
          </li>

        </ul>

        <div class="tab-content">

          <!-- LOGIN -->
          <div class="tab-pane fade show active" id="login">

            <h2 class="form-title">
              Welcome Back
            </h2>

            <form>

              <div class="mb-3">
                <label>Email Address</label>

                <input type="email"
                       class="form-control"
                       placeholder="Enter your email">
              </div>

              <div class="mb-3">
                <label>Password</label>

                <input type="password"
                       class="form-control"
                       placeholder="Enter your password">
              </div>

              <div class="d-flex justify-content-between align-items-center mb-4">

                <div class="small-text">
                  <input type="checkbox">
                  Remember Me
                </div>

                <a href="#" class="forgot-link">
                  Forgot Password?
                </a>

              </div>

              <button class="btn btn-main w-100">
                <i class="bi bi-box-arrow-in-right"></i>
                Login
              </button>

            </form>

          </div>

          <!-- REGISTER -->
          <div class="tab-pane fade" id="register">

            <h2 class="form-title">
              Create Account
            </h2>

            <form>

              <div class="mb-3">
                <label>Full Name</label>

                <input type="text"
                       class="form-control"
                       placeholder="Enter full name">
              </div>

              <div class="mb-3">
                <label>Email Address</label>

                <input type="email"
                       class="form-control"
                       placeholder="Enter email">
              </div>

              <div class="mb-3">
                <label>Mobile Number</label>

                <input type="text"
                       class="form-control"
                       placeholder="Enter mobile number">
              </div>

              <div class="mb-3">
                <label>Password</label>

                <input type="password"
                       class="form-control"
                       placeholder="Create password">
              </div>

              <button class="btn btn-main w-100">
                <i class="bi bi-person-plus-fill"></i>
                Register Now
              </button>

            </form>

          </div>

          <!-- FORGOT PASSWORD -->
          <div class="tab-pane fade" id="forgot">

            <h2 class="form-title">
              Reset Password
            </h2>

            <form>

              <div class="mb-4">
                <label>Registered Email</label>

                <input type="email"
                       class="form-control"
                       placeholder="Enter your registered email">
              </div>

              <button class="btn btn-main w-100">
                <i class="bi bi-envelope-fill"></i>
                Send Reset Link
              </button>

            </form>

          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
